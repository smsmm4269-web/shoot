<style>
body {
    background: linear-gradient(135deg, #000022, #000055);
    text-align: center;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    color: white;
}

body img:first-of-type {
    width: 240px;
    height: 225px;
    border-radius: 55%;
    margin-top: 20px;
}

.types {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 80px;
    padding: 30px;
    justify-items: center;
}

button {
    background-color: #1e1e1e;
    border: none;
    padding: 10px;
    border-radius: 20px;
    cursor: pointer;
    transition: 1s;
    width: 220px;
    color: white;
    font-size: 16px;
}

button:hover {
    transform: scale(1.05);
    background-color: #00a79e;
    letter-spacing: 15px;
}

button img {
    width: 200px;
    height: 200px;
    border-radius: 30px;
}

p {
    margin-top: 10px;
    font-size: 16px;
    color: white;
}

a {
    text-decoration: none;
}

.line {
    grid-column: 1 / -1;
    width: 100%;
    height: 3px;
    background-color: #fff;
}

/* تابلت */
@media (max-width:900px){
    .types{
        gap:40px;
    }

    button{
        width:200px;
    }

    button img{
        width:180px;
        height:180px;
    }
}

/* موبايل */
@media (max-width:500px){
    .types{
        gap:20px;
        padding:20px;
    }

    button{
        width:90%;
    }

    button img{
        width:150px;
        height:150px;
    }

    body img:first-of-type{
        width:180px;
        height:170px;
    }
}
</style>
