<style>
body{
    background-color: #111;
    text-align: center;
}

.buttons{
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 50px;
    padding: 30px;
    justify-items: center;
}

button{
    background-color: #1e1e1e;
    border: none;
    padding: 10px;
    border-radius: 20px;
    cursor: pointer;
    transition: 0.5s;
    width: 220px;
    color: white;
}

button:hover{
    transform: scale(1.05);
    background-color: #000653;
    letter-spacing: 15px;
}

p{
    color: white;
    font-size: 16px;
    margin-top: 10px;
}

a{
    text-decoration: none;
}

.line{
    grid-column: 1 / -1;
    width: 100%;
    height: 3px;
}

/* للتابلت */
@media (max-width:900px){
    .buttons{
        grid-template-columns: repeat(2, 1fr);
        gap: 30px;
    }
}

/* للموبايل */
@media (max-width:500px){
    .buttons{
        grid-template-columns: repeat(1, 1fr);
        gap: 20px;
    }

    button{
        width: 90%;
    }
}
