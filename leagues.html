<style>
.img{
    text-align: center;
}

body{
    background-color: rgb(142, 52, 226);
}

.buttons{
    display: grid;
    grid-template-columns: repeat(4, 1fr); 
    gap: 60px;
    padding: 30px;
    justify-items: center;
}

button{
    background-color: #1e1e1e;
    border: none;
    padding: 10px;
    border-radius: 20px;
    cursor: pointer;
    transition: 0.5s;
    width: 220px;
    color: white;
}

button:hover{
    transform: scale(1.05);
    background-color: #000125;
    letter-spacing: 7px;
}

p{
    color: white;
    font-size: 16px;
    margin-top: 10px;
}

a{
    text-decoration: none;
}

.line{
    grid-column: 1 / -1; 
    width: 100%;
    height: 3px;
    background-color: #2c2c2c;
}

/* تابلت */
@media (max-width:900px){
    .buttons{
        grid-template-columns: repeat(2, 1fr);
        gap: 40px;
    }
}

/* موبايل */
@media (max-width:500px){
    .buttons{
        grid-template-columns: repeat(1, 1fr);
        gap: 20px;
    }

    button{
        width: 90%;
    }
}
</style>
